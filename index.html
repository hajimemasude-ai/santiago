<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E67E22">
    <link rel="manifest" href="manifest.json">
    <title>The Old Man and the Sea - Reading Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
    <div class="app-wrapper">
        <!-- Chapter Navigation Panel -->
        <div id="chapter-panel" class="chapter-panel glass hidden">
            <div class="chapter-panel-header">Chapters</div>
            <div id="chapter-list" class="chapter-list"></div>
        </div>
        <button id="btn-chapters" class="fab-chapters" title="Jump to chapter">☰</button>

        <!-- Fixed Search Bar -->
        <div class="fixed-search-bar glass">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search text to jump to..." autocomplete="off">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <div id="search-results" class="search-results glass hidden"></div>
            </div>
        </div>

        <header class="app-header">
            <div class="header-content">
                <h1>The Old Man and the Sea</h1>
                <p class="subtitle">Interactive Reading Assistant</p>
            </div>
        </header>

        <main class="reading-container" id="reading-container">
            <!-- Content structurally rendered via JS -->
        </main>
        
        <!-- Spacing so bottom bar doesn't cover text -->
        <div class="bottom-spacer"></div>
    </div>

    <!-- Bottom Control Bar -->
    <div class="bottom-bar glass" id="bottom-bar">
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="controls-container">
            <div class="status-indicator">
                <div class="pulse-dot" id="pulse-dot"></div>
                <span class="status-text" id="status-text">Click any word for definition and reading.</span>
            </div>
            <div class="controls">
                <button id="btn-speed" class="btn secondary speed-btn">0.8x</button>
                <button id="btn-play-pause" class="btn primary" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-play-pause"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    <span id="text-play-pause">Pause</span>
                </button>
                <button id="btn-stop" class="btn secondary" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                    Stop
                </button>
            </div>
        </div>
    </div>


    <!-- Dictionary Bottom Sheet (Mobile Friendly) -->
    <div id="dict-modal" class="dict-modal">
        <div class="dict-overlay" id="dict-overlay"></div>
        <div class="dict-content">
            <div class="drag-handle"></div>
            <div class="dict-header">
                <div class="dict-header-left">
                    <h2 id="dict-word">Word</h2>
                    <span id="dict-phonetic" class="dict-phonetic"></span>
                </div>
                <div class="dict-header-right">
                    <button class="dict-pronounce-btn" id="dict-pronounce-btn" title="Pronounce">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                    <button class="dict-close-btn" id="dict-close-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
            <!-- TTS Action Bar -->
            <div class="dict-tts-bar" id="dict-tts-bar">
                <button class="dict-tts-btn" data-action="word" id="dict-btn-word">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    Read Word
                </button>
                <button class="dict-tts-btn" data-action="sentence" id="dict-btn-sentence">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
                    Read Sentence
                </button>
                <button class="dict-tts-btn" data-action="paragraph" id="dict-btn-paragraph">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="12" x2="3" y2="12"></line><line x1="21" y1="18" x2="3" y2="18"></line></svg>
                    Read Paragraph
                </button>
            </div>
            <div class="dict-body" id="dict-body">
                <div class="dict-loading" id="dict-loading">
                    <div class="dict-spinner"></div>
                    <span>Looking up word...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="book_data.js"></script>
    <script src="app.js?v=3"></script>
</body>
</html>
